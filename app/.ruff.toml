# Lint ve format ayarları (backlog: 'Implement linting and code formatting')
# Kullanım:  ruff check .    (hatalar)    ruff format .   (biçimlendirme)
line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "UP", "B"]

[lint.per-file-ignores]
# app.py bir görünüm dosyası: gömülü HTML/CSS şablonlarında satır uzunluğu
# sınırı okunabilirliği artırmıyor, tersine şablonları parçalıyor.
"app.py" = ["E501"]
